services:
  discord-bot:
    build: .
    container_name: discord-bot
    restart: unless-stopped
    mem_limit: 256m
    env_file: .env
    networks:
      - alex2-net
    healthcheck:
      test: ["CMD-SHELL", "node -e 'process.exit(0)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  alex2-net:
    external: true
